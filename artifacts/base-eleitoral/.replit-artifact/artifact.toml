kind = "web"
previewPath = "/"
title = "Base Eleitoral 360"
version = "1.0.0"
id = "artifacts/base-eleitoral"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25022

[services.development]
run = "pnpm --filter @workspace/base-eleitoral run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/base-eleitoral", "run", "build" ]
publicDir = "artifacts/base-eleitoral/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25022"
BASE_PATH = "/"
